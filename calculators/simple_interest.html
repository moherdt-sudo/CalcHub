<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator - CalcHub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .hide { display: none; }
        .alert-warning { color: #991b1b; font-size: 0.75rem; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <header>
        <h1>CalcHub</h1>
        <nav>
            <a href="../index.html">Home</a>
            <a href="#">Calculators</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
        <div class="calculator-card">
            <div class="calculator-header">
                <h2>Simple Interest Calculator</h2>
                <p>Calculate total interest and amount for your principal.</p>
            </div>

            <form id="form">
                <div class="form-group">
                    <label for="principal">Principal (P in ₹)</label>
                    <input type="number" id="principal" placeholder="100000" onchange="checkNumberP()" required>
                    <strong id="errorMsgP"></strong>
                </div>

                <div class="form-group">
                    <label for="rate">Rate (R in % per annum)</label>
                    <input type="number" id="rate" placeholder="10" onchange="checkNumberR()" required>
                    <strong id="errorMsgR"></strong>
                </div>

                <div class="form-group">
                    <label for="time">Time (n in years)</label>
                    <input type="number" id="time" placeholder="1" onchange="checkNumberN()" required>
                    <strong id="errorMsgN"></strong>
                </div>

                <div class="button-group">
                    <button type="button" id="reset-btn" onclick="resetInputs()" class="secondary">Reset</button>
                    <button type="submit">Calculate Interest</button>
                </div>
            </form>

            <div id="result" class="result-container hide">
                <h3>Calculation Result</h3>
                <p>Total Interest: <span class="result-value" id="resultInterest"></span></p>
                <p>Total Amount: <span class="result-value" id="resultAmount"></span></p>
            </div>
        </div>

        <section class="recommended-tools">
            <h4>Recommended Tools</h4>
            <div class="tools-grid">
                <div class="tool-item">Compound Interest</div>
                <div class="tool-item">EMI Calculator</div>
                <div class="tool-item">VAT Calculator</div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CalcHub. All rights reserved.</p>
    </footer>

    <script src="../js/simple_interest.js"></script>
</body>
</html>
